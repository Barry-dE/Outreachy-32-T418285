      // Class that prints JSON metadata in a human legible format
      class FormatJsonMetadata {
        constructor(articleMetadata) {
          this.articleMetadata = articleMetadata;
        }

        #formatDate(dateString) {
          const [year, month, day] = dateString.split("-").map(Number);
          const date = new Date(year, month - 1, day);
          return date.toLocaleDateString("en-US", {
            year: "numeric",
            month: "long",
            day: "numeric",
          });
        }

        #formatArticle(metadata) {
          const formattedDate = this.#formatDate(metadata.creation_date);
          return `Article "${metadata.title}" (Page ID ${metadata.page_id}) was created at ${formattedDate}.`;
        }

        render(targetElementId) {
          const container = document.getElementById(targetElementId);
          const list = document.createElement("ol");
          list.type = "A";

          for (const metadata of this.articleMetadata) {
            const item = document.createElement("li");
            item.textContent = this.#formatArticle(metadata);
            list.appendChild(item);
          }

          container.appendChild(list);
        }
      }

      new FormatJsonMetadata(data).render("results");
    </script>
